<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#f2ca50",
                    "surface-container-lowest": "#0e0e0e",
                    "outline-variant": "#4d4635",
                    "surface-tint": "#e9c349",
                    "on-tertiary-fixed-variant": "#004493",
                    "on-secondary-container": "#b7b5b4",
                    "inverse-surface": "#e5e2e1",
                    "tertiary-fixed": "#d8e2ff",
                    "error-container": "#93000a",
                    "error": "#ffb4ab",
                    "on-secondary": "#313030",
                    "inverse-on-surface": "#313030",
                    "tertiary": "#bacfff",
                    "on-error-container": "#ffdad6",
                    "on-surface": "#e5e2e1",
                    "on-tertiary": "#002e68",
                    "inverse-primary": "#735c00",
                    "surface-bright": "#393939",
                    "on-primary-fixed": "#241a00",
                    "on-primary-fixed-variant": "#574500",
                    "primary-fixed": "#ffe088",
                    "on-secondary-fixed-variant": "#474746",
                    "secondary-fixed": "#e5e2e1",
                    "surface-container-low": "#1c1b1b",
                    "on-primary": "#3c2f00",
                    "surface-variant": "#353534",
                    "on-primary-container": "#554300",
                    "tertiary-container": "#8db3ff",
                    "surface-container": "#201f1f",
                    "surface-container-highest": "#353534",
                    "surface-container-high": "#2a2a2a",
                    "on-secondary-fixed": "#1c1b1b",
                    "surface-dim": "#131313",
                    "secondary": "#c8c6c5",
                    "secondary-container": "#474746",
                    "primary-fixed-dim": "#e9c349",
                    "on-tertiary-container": "#004390",
                    "surface": "#131313",
                    "background": "#131313",
                    "on-tertiary-fixed": "#001a41",
                    "on-background": "#e5e2e1",
                    "primary-container": "#d4af37",
                    "on-surface-variant": "#d0c5af",
                    "tertiary-fixed-dim": "#adc7ff",
                    "secondary-fixed-dim": "#c8c6c5",
                    "outline": "#99907c",
                    "on-error": "#690005"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .inner-shadow-outline-variant-15 {
            box-shadow: inset 0 0 0 1px rgba(77, 70, 53, 0.15);
        }
        .tonal-shift {
            background: linear-gradient(to bottom, transparent, #1C1B1B);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Visual Side: Editorial Impact -->
<section class="hidden md:flex md:w-1/2 relative overflow-hidden bg-surface-container-lowest">
<div class="absolute inset-0 z-0 opacity-60">
<img class="w-full h-full object-cover grayscale contrast-125" data-alt="close-up of a master barber's tools on a dark textured leather surface with dramatic warm cinematic lighting and shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDla6ZV-S3SxuQSOIyEIDy8jmh-o-BfX_XUeXhnaZqIwZPwaDE_7XKyUvnXm-6fjmh5Ro5ogLQDfPf0KLbdkp7Uxn36cp8bhEjjIyfMPrQNFw6zmahoeGFn_rUMmXiW7PiulLrLwRO1p-vS4B6S5VqFe7QU2MW1e9heaoqK9azdq6Ey_NJ_q5EHvYzdajnaO9eTuXjYThRMVqXAoVjCisawYYl4M3Oh-HTHZfoe-MjL_xtuczhk-ddlo9az1jwayoqmtBdqwJ1JNsFW"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent z-10"></div>
<div class="relative z-20 flex flex-col justify-end p-16 space-y-6">
<div class="inline-block border-l-2 border-primary pl-6">
<h2 class="font-headline text-5xl font-bold tracking-tighter text-on-surface uppercase leading-none">
                        The <br/> <span class="text-primary">Atelier</span> Experience
                    </h2>
</div>
<p class="max-w-md text-on-surface-variant text-lg leading-relaxed">
                    Más que un corte, es una declaración de intenciones. Accede a la red más exclusiva de maestros artesanos de la imagen.
                </p>
</div>
</section>
<!-- Registration Side: Task Focus -->
<section class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-12 lg:p-24 bg-surface min-h-screen">
<div class="w-full max-w-md space-y-10">
<!-- Branding Header -->
<header class="space-y-4">
<div class="flex items-center space-x-2">
<span class="text-primary font-headline font-bold text-2xl tracking-tighter">THE ATELIER</span>
</div>
<div class="space-y-2">
<h1 class="font-headline text-4xl font-bold text-on-surface tracking-tight leading-tight">Únete al Círculo</h1>
<p class="text-on-surface-variant font-medium">Crea tu perfil para reservas exclusivas</p>
</div>
</header>
<!-- Registration Form -->
<form class="space-y-6">
<div class="grid grid-cols-1 gap-5">
<!-- Full Name -->
<div class="group space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors duration-300">Nombre completo</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-xl inner-shadow-outline-variant-15 overflow-hidden transition-all duration-300 focus-within:bg-surface-container-low group-focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl">person</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="Tu nombre" type="text"/>
</div>
</div>
<!-- Email -->
<div class="group space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors duration-300">Email</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-xl inner-shadow-outline-variant-15 overflow-hidden transition-all duration-300 focus-within:bg-surface-container-low group-focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="email@ejemplo.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="group space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors duration-300">Teléfono</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-xl inner-shadow-outline-variant-15 overflow-hidden transition-all duration-300 focus-within:bg-surface-container-low group-focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl">call</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="+34 000 000 000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="group space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant group-focus-within:text-primary transition-colors duration-300">Contraseña</label>
<div class="relative flex items-center bg-surface-container-lowest rounded-xl inner-shadow-outline-variant-15 overflow-hidden transition-all duration-300 focus-within:bg-surface-container-low group-focus-within:ring-1 ring-primary/20">
<span class="material-symbols-outlined absolute left-4 text-outline text-xl">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-outline text-xl cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="space-y-4 pt-4">
<button class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-sm tracking-widest uppercase shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all duration-400 active:scale-[0.98]" type="submit">
                            CREAR CUENTA
                        </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-xs font-bold uppercase text-outline tracking-widest">o</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<button class="w-full py-4 px-6 rounded-xl bg-surface-container-highest text-on-surface font-bold text-sm tracking-widest uppercase hover:bg-surface-bright transition-all duration-400 flex items-center justify-center space-x-3 inner-shadow-outline-variant-15" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Registrarse con Google</span>
</button>
</div>
</form>
<!-- Footer Link -->
<footer class="text-center pt-8">
<p class="text-on-surface-variant text-sm">
                        ¿Ya tienes cuenta? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1 transition-all" href="#">Iniciar sesión</a>
</p>
</footer>
</div>
</section>
</main>
</body></html>
